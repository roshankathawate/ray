  stage: lint
  image: 
    name: "$CI_TEST_IMAGE"
  script: 
    - | 
      bash --login -i -c "
        pip install -c python/requirements_compiled.txt semgrep
        semgrep ci --config semgrep.yml
      "
  allow_failure: true
  only:
    - merge_requests

