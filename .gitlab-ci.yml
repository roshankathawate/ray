# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

stages:          # List of stages for jobs, and their order of execution
  - build_base_image
  - lint
  - unit-test
  - vsphere_extension_tests
  - functionality_tests

variables:
  CI_BASE_IMAGE: $PROD_URL/ray_taiga_cicd/oss-ci-base_test
  CI_TEST_IMAGE: $PROD_URL/ray_taiga_cicd/oss-ci_test
  # DOCKER_DRIVER: overlay
  DEFAULT_BRANCH: remotes/origin/oss-master

# $CI_BASE_IMAGE is the basis of lint and unit test and needs to be updated in time. 
# Since each build is time-consuming, it is only updated when it is a dev branch.
ci_env_docker_build:
  stage: build_base_image
  image: docker:latest
  script: 
    - echo "$PROD_API_USER" "$PROD_API_KEY"
    - docker login -u "$PROD_API_USER" -p "$PROD_API_KEY" "$PROD_URL"
    - docker pull $CI_BASE_IMAGE || true
    - docker pull $CI_TEST_IMAGE || true
    - docker build -t $CI_BASE_IMAGE --cache-from $CI_BASE_IMAGE -f ./ci/docker/base.test.Dockerfile .
    - sed -i '18s/SKIP_BAZEL_BUILD=1 RAY_INSTALL_JAVA=0 //' ./ci/docker/test.Dockerfile
    - docker build --build-arg DOCKER_IMAGE_BASE_TEST=$CI_BASE_IMAGE -t $CI_TEST_IMAGE --cache-from $CI_TEST_IMAGE -f ./ci/docker/test.Dockerfile .
    - docker push $CI_BASE_IMAGE
    - docker push $CI_TEST_IMAGE
  only:
    - dev

# Convert from .buildkite/lint.rayci.yml "clang format"
lint_clang-format:
  stage: lint
  image: 
    name: "$CI_TEST_IMAGE"
  script: 
    - | 
      bash --login -i -c "
        pip install -c python/requirements_compiled.txt clang-format
        ./ci/lint/check-git-clang-format-output.sh 
      "
  allow_failure: true
  only:
    - merge_requests

# Convert from .buildkite/lint.rayci.yml "clang format"
lint_code-format:
  stage: lint
  image: 
    name: "$CI_TEST_IMAGE"
  script:
    - | 
      bash --login -i -c "
        pip install -c python/requirements_compiled.txt -r python/requirements/lint-requirements.txt
        FORMAT_SH_PRINT_DIFF=1 ./ci/lint/format.sh --all-scripts
      "
  allow_failure: false
  only:
    - merge_requests

# Convert from .buildkite/lint.rayci.yml "untested code snippet"
