# Convert from .buildkite/pipeline.test.yml "LinkCheck"
unit-test_LinkCheck:
  stage: unit-test
  image: 
    name: "$CI_TEST_IMAGE"
  script: 
    - | 
      bash --login -i -c "
        export LINT=1
        ./ci/env/install-dependencies.sh
        ./ci/ci.sh check_sphinx_links
      "
  allow_failure: true
  needs: []
  only:
    - merge_requests

# Convert from .buildkite/pipeline.test.yml "Tune soft imports test"
unit-test_Tune-soft-imports-test:
  stage: unit-test
  image: 
    name: "$CI_TEST_IMAGE"

  script: 
    - |
      bash --login -i -c "
        cleanup() { if [ "${BUILDKITE_PULL_REQUEST}" = "false" ]; then ./ci/build/upload_build_info.sh; fi }; trap cleanup EXIT
        # no TUNE_TESTING=1 on purpose
        ./ci/env/install-dependencies.sh
        ./ci/env/env_info.sh
        pip install -U $RAY_WHL
        python python/ray/setup-dev.py --skip rllib air tune train cloudpickle data internal tests experimental util workflow dag widgets cluster_utils.py _private dashboard scripts serve -y
        bazel test --config=ci $(./ci/run/bazel_export_options) --build_tests_only --test_tag_filters=soft_imports python/ray/tune/...
      "
  allow_failure: true
  needs: []
  only:
    - merge_requests

