# Convert from .buildkite/lint.rayci.yml "doc readme"
lint_doc-readme:
  stage: lint
  image: 
    name: "$CI_TEST_IMAGE"
  script: 
    - | 
      bash --login -i -c "
        pip install -c python/requirements_compiled.txt docutils
        cd python && python setup.py check --restructuredtext --strict --metadata
      "
  allow_failure: false
  only:
    - merge_requests

